version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: drinks4all-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drinks4all
    ports:
      - "5432:5432"
    volumes:
      - drinks4all_pg:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: drinks4all-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  drinks4all_pg:
