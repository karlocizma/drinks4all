services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drinks4all-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/drinks4all
      TIMEZONE: ${TIMEZONE:-Europe/Berlin}
      REMEMBER_ME_DAYS: ${REMEMBER_ME_DAYS:-30}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SENDER: ${SMTP_SENDER:-noreply@drinks4all.local}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      BUYER_REPORT_EMAIL: ${BUYER_REPORT_EMAIL:-buyer@drinks4all.local}
      UPLOAD_DIR: ${UPLOAD_DIR:-app/static/uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
    ports:
      - "8000:8000"
    volumes:
      - drinks4all_uploads:/app/app/static/uploads

  postgres:
    image: postgres:17
    container_name: drinks4all-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drinks4all
    ports:
      - "5432:5432"
    volumes:
      - drinks4all_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drinks4all"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: drinks4all-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  drinks4all_pg:
  drinks4all_uploads:
