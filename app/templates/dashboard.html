<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks4All - Dashboard</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header class="topbar">
    <h1>My Drinks</h1>
    <div class="actions">
      <input type="month" id="month-picker" />
      <button id="refresh-summary">Refresh Summary</button>
      <button id="undo-last">Undo Last</button>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Monthly Summary</h2>
      <p id="summary">Loading...</p>
      <a id="paypal-pay-btn" href="#" target="_blank" rel="noopener noreferrer" class="pay-btn" style="display:none;">Pay with PayPal</a>
      <div id="breakdown"></div>
      <h3>Change Password</h3>
      <form id="password-form" class="grid compact-form">
        <input id="old-password" type="password" placeholder="Old password" required />
        <input id="new-password" type="password" placeholder="New password" required />
        <button type="submit">Update Password</button>
      </form>
    </section>
    <section>
      <h2>Available Drinks</h2>
      <div id="drink-grid" class="drink-grid"></div>
    </section>
    <p id="error" class="error"></p>
  </main>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
